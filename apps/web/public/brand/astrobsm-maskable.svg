    <text x="332" y="338" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="96" letter-spacing="3">BSM</text>
    <text x="332" y="380" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="28">BonneSante Medicals</text>
