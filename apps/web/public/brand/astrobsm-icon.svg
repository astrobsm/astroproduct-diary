<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ASTROBSM">
  <!-- App tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="#2e2fa0"/>
  <!-- Open-book outline: left page (spine) -->
  <path d="M198 150 q-27 0 -27 28 V 384"
        fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Open-book outline: base + right page sweep -->
  <path d="M171 384 q0 40 40 40 H 360 q44 0 44 -44"
        fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner page line -->
  <path d="M210 416 H 356 q34 0 34 -34"
        fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brand text -->
  <text x="332" y="244" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="72" letter-spacing="6">ASTRO</text>
  <text x="332" y="338" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="96" letter-spacing="3">BSM</text>
  <text x="332" y="380" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="28">BonneSante Medicals</text>
  <!-- Bookmark ribbon -->
  <path d="M236 388 h56 v76 l-28 -20 l-28 20 z" fill="#ffffff"/>
</svg>
