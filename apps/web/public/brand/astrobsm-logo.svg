<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 250" role="img" aria-label="ASTROBSM ProductDiary">
  <!-- Book body -->
  <rect x="105" y="8" width="150" height="162" rx="16" fill="#2e2fa0"/>
  <!-- Spine highlight -->
  <rect x="119" y="18" width="5" height="142" rx="2.5" fill="#ffffff" opacity="0.5"/>
  <!-- Inside text -->
  <text x="180" y="62" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="30" letter-spacing="4">ASTRO</text>
  <text x="180" y="112" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="44" letter-spacing="2">BSM</text>
  <text x="180" y="136" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="13">BonneSante Medicals</text>
  <!-- Open-book base / pages -->
  <rect x="105" y="164" width="150" height="16" rx="8" fill="#2e2fa0"/>
  <rect x="114" y="170" width="132" height="4" rx="2" fill="#ffffff" opacity="0.6"/>
  <!-- Bookmark ribbon -->
  <path d="M163 170 v26 l17 -12 l17 12 v-26 z" fill="#2e2fa0"/>
  <!-- Wordmark -->
  <text x="180" y="234" text-anchor="middle" fill="#2e2fa0" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="48" letter-spacing="-1">ProductDiary</text>
</svg>
